# Blanc — full-stack compose file.
#
#   docker compose up --build
#
# Reads env vars from .env at the repo root. Copy .env.example → .env
# and fill in secrets before running.
#
# Services:
#   mariadb    → application DB (data persisted to named volume)
#   rabbitmq   → task queue      (data persisted to named volume)
#   api        → FastAPI backend (blancService/), depends on mariadb + rabbitmq
#   ui         → Next.js frontend (atm/),        depends on api
#
# On first boot MariaDB provisions ${MARIADB_DATABASE} automatically.

services:

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"   # bind to loopback — safer default
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"  # management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./blancService
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      # Secrets — sourced from .env (never committed).
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI}
      ALLOWED_DOMAIN: ${ALLOWED_DOMAIN}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      # Infra creds — used by entrypoint.sh's envsubst.
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      # Persist uploads and the Chroma RAG store across container rebuilds.
      - api_uploads:/app/uploads
      - api_chroma:/app/data/chroma
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ui:
    build:
      context: ./blancUi
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      api:
        condition: service_healthy

volumes:
  mariadb_data:
  rabbitmq_data:
  api_uploads:
  api_chroma:
