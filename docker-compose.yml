# Blanc — full-stack compose file.
#
#   cp blancService/atm/config/docker.yml.example \
#      blancService/atm/config/docker.yml
#   # edit docker.yml — OpenAI key, JWT secret, admin email, etc.
#   docker compose up --build
#
# All app configuration lives in blancService/atm/config/docker.yml.
# No .env file is used. Infra credentials for the mariadb / rabbitmq
# containers are hardcoded below and match the defaults referenced by
# docker.yml.example. Change both sides together if you want different
# values.
#
# Services:
#   mariadb    → application DB (data persisted to named volume)
#   rabbitmq   → task queue      (data persisted to named volume)
#   api        → FastAPI backend (blancService/), depends on mariadb + rabbitmq
#   ui         → Next.js frontend (blancUi/),    depends on api
#
# Every port is bound to 127.0.0.1 — nothing gets exposed to the
# public network by default.

services:

  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: atm-root
      MARIADB_DATABASE: atm
      MARIADB_USER: atm
      MARIADB_PASSWORD: atm
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"  # management UI (http://localhost:15672)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./blancService
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      # Mount the user's docker.yml into the container as the sole
      # config source. Read-only — the app never writes it.
      - ./blancService/atm/config/docker.yml:/app/atm/config/docker.yml:ro
      # Persist uploads and the Chroma RAG store across container rebuilds.
      - api_uploads:/app/uploads
      - api_chroma:/app/data/chroma
    depends_on:
      mariadb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  ui:
    build:
      context: ./blancUi
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time. Change here if
        # you're serving the api on a different host / port.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  mariadb_data:
  rabbitmq_data:
  api_uploads:
  api_chroma:
